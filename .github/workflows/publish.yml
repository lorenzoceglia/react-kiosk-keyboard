name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to npm & GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --force

      - name: Build
        run: pnpm build

      - name: Publish to npm (with Trusted Publishing)
        run: |
          echo "📦 Publishing to npm with Trusted Publishing..."
          pnpm publish --registry https://registry.npmjs.org --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare GitHub scoped package
        run: |
          echo "🔧 Changing package name for GitHub Packages..."
          jq '.name = "@${{ github.repository_owner }}/react-kiosk-keyboard"' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: |
          echo "📦 Publishing to GitHub Packages..."
          pnpm publish --registry https://npm.pkg.github.com --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}